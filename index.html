<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Youth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Mono:wght@500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'DM Mono', monospace;
      background: #111;
    }

    /* ── Background ── */
    #bg {
      position: fixed; inset: 0;
      background-image: url('background.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    #bg::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
    }

    /* ── 16:9 Viewport ── */
    #stage {
      position: fixed; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    #screen {
      position: relative;
      width: min(100vw, calc(100vh * 16/9));
      height: min(100vh, calc(100vw * 9/16));
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 5%;
      gap: 2vh;
    }

    /* ── Title ── */
    .title-block {
      background: #ffd23f;
      border: 4px solid #111;
      box-shadow: 7px 7px 0 #111;
      padding: 0.5em 1em;
      display: inline-block;
      margin-bottom: 1vh;
    }
    .title-block h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.8rem, 5vw, 5rem);
      color: #111;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .title-block .sub {
      font-size: clamp(0.6rem, 1.3vw, 1.1rem);
      color: #111;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      margin-top: 0.2em;
    }

    /* ── Menu ── */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 1.2vh;
    }
    .neo-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.85rem, 1.8vw, 1.5rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0.55em 1.6em;
      border: 3px solid #111;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 5px 5px 0 #111;
      transform: translate(0,0);
      background: #fff;
      color: #111;
      display: flex;
      align-items: center;
      gap: 0.6em;
      width: fit-content;
    }
    .neo-btn .icon { font-size: 1.1em; }
    .neo-btn:hover  { transform: translate(-3px,-3px); box-shadow: 8px 8px 0 #111; }
    .neo-btn:active { transform: translate(1px,1px);  box-shadow: 2px 2px 0 #111; }

    .neo-btn.play    { background: #ff006e; color: #fff; border-color: #111; }
    .neo-btn.music   { background: #8338ec; color: #fff; }
    .neo-btn.guides  { background: #3a86ff; color: #fff; }
    .neo-btn.contact { background: #ffd23f; color: #111; }

    /* ── Footer tag ── */
    .tag {
      position: absolute;
      bottom: 4%;
      right: 4%;
      background: #111;
      color: #ffd23f;
      font-size: clamp(0.5rem, 1vw, 0.8rem);
      padding: 0.4em 0.8em;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 2px solid #ffd23f;
    }

    /* ── Noise overlay for texture ── */
    #noise {
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }
  </style>
</head>
<body>

  <div id="bg"></div>
  <div id="noise"></div>

  <div id="stage">
    <div id="screen">

      <div class="title-block">
        <h1>Community Youth</h1>
        <div class="sub">Production Hub</div>
      </div>

      <nav class="menu">
        <button class="neo-btn play"    onclick="go('games.html')"><span class="icon">▶</span> Play Games</button>
        <button class="neo-btn music"   onclick="go('Music/')"><span class="icon">♪</span> Music</button>
        <button class="neo-btn guides"  onclick="go('guides.html')"><span class="icon">☰</span> Guides</button>
        <button class="neo-btn contact" onclick="go('portal.html')"><span class="icon">⊞</span> Portal</button>
      </nav>

      <div class="tag">Corona, CA · 2026</div>
    </div>
  </div>

  <script>
    function go(href) {
      const a = new (window.AudioContext || window.webkitAudioContext)();
      const o = a.createOscillator();
      const g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = 'square'; o.frequency.value = 440;
      g.gain.setValueAtTime(0.08, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.12);
      o.start(); o.stop(a.currentTime + 0.12);
      setTimeout(() => window.location.href = href, 130);
    }

    // Hover sound
    document.querySelectorAll('.neo-btn').forEach(btn => {
      btn.addEventListener('mouseenter', () => {
        const a = new (window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator();
        const g = a.createGain();
        o.connect(g); g.connect(a.destination);
        o.type = 'square'; o.frequency.value = 300;
        g.gain.setValueAtTime(0.04, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.07);
        o.start(); o.stop(a.currentTime + 0.07);
      });
    });
  </script>
</body>
</html>
