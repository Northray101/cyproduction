<!DOCTYPE html>
<html>
<head>
    <title>Community Youth Retro Games</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        canvas { image-rendering: pixelated; border: 3px solid #fff; }
        #info { color: #fff; font-family: monospace; margin-bottom: 10px; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="info">Community Youth Mini Games</div>
    <canvas id="game" width="320" height="240"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        // Web Audio for 8-bit chiptune sounds
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(freq = 440, duration = 0.1, type = 'square') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
        }

        // Background music loop (simple chiptune melody)
        const melody = [262, 294, 330, 349, 392, 440, 494, 523];
        let melodyIdx = 0;
        function playMelody() {
            beep(melody[melodyIdx % melody.length], 0.18, 'square');
            melodyIdx++;
        }
        setInterval(playMelody, 300);

        // Input
        const keys = {};
        window.addEventListener('keydown', e => { keys[e.key] = true; audioCtx.resume(); });
        window.addEventListener('keyup', e => keys[e.key] = false);

        // --- CHARACTERS (Community Youth placeholders) ---
        const characters = [
            { name: 'Alex', color: '#f00' },
            { name: 'Jordan', color: '#0ff' },
            { name: 'Taylor', color: '#ff0' },
            { name: 'Morgan', color: '#f0f' },
        ];
        let charIdx = 0;

        // --- MINI GAME 1: JUMP ---
        let playerY = 185, velY = 0, obstacleX = 320, jumped = false;
        let jumpScore = 0;
        function jumpReset() { playerY = 185; velY = 0; obstacleX = 320; jumped = false; }
        function jumpUpdate() {
            if ((keys['ArrowUp'] || keys[' ']) && playerY >= 185) { velY = -6; beep(659, 0.05); }
            velY += 0.35;
            playerY += velY;
            if (playerY > 185) { playerY = 185; velY = 0; }
            obstacleX -= 3;
            if (obstacleX < -30) { obstacleX = 320 + Math.random() * 100; jumpScore++; beep(523, 0.1); }
        }
        function jumpDraw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, 320, 240);
            ctx.fillStyle = '#555';
            ctx.fillRect(0, 200, 320, 40);
            // Player
            ctx.fillStyle = characters[charIdx].color;
            ctx.fillRect(50, playerY, 20, 20);
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(55, playerY + 4, 4, 4);
            ctx.fillRect(63, playerY + 4, 4, 4);
            // Obstacle (cactus-like)
            ctx.fillStyle = '#0f0';
            ctx.fillRect(obstacleX, 185, 18, 15);
            ctx.fillRect(obstacleX + 5, 175, 8, 12);
            // Ground line
            ctx.fillStyle = '#888';
            ctx.fillRect(0, 200, 320, 2);
            ctx.fillStyle = '#fff';
            ctx.font = '8px monospace';
            ctx.fillText(`JUMP! [SPACE/UP]  Cleared: ${jumpScore}`, 10, 12);
            ctx.fillText(`${characters[charIdx].name}`, 10, 230);
        }

        // --- MINI GAME 2: CATCH ---
        let basketX = 140;
        let balls = [];
        let catchScore = 0;
        let missCount = 0;
        function catchReset() { basketX = 140; balls = []; catchScore = 0; missCount = 0; }
        function spawnBall() {
            if (Math.random() < 0.03) balls.push({ x: Math.random() * 290, y: 0, speed: 2 + Math.random() * 2 });
        }
        function catchUpdate() {
            if (keys['ArrowLeft']) basketX = Math.max(0, basketX - 4);
            if (keys['ArrowRight']) basketX = Math.min(280, basketX + 4);
            spawnBall();
            balls = balls.filter(b => {
                b.y += b.speed;
                if (b.y > 210 && b.y < 225 && b.x > basketX && b.x < basketX + 40) {
                    catchScore++;
                    beep(784, 0.07);
                    return false;
                }
                if (b.y > 240) { missCount++; return false; }
                return true;
            });
        }
        function catchDraw() {
            ctx.fillStyle = '#001133';
            ctx.fillRect(0, 0, 320, 240);
            // Stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 20; i++) ctx.fillRect((i * 47) % 320, (i * 31) % 160, 2, 2);
            // Balls
            balls.forEach(b => {
                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
                ctx.fill();
            });
            // Basket (character colored)
            ctx.fillStyle = characters[charIdx].color;
            ctx.fillRect(basketX, 215, 40, 10);
            ctx.fillStyle = '#fff';
            ctx.font = '8px monospace';
            ctx.fillText(`CATCH! [LEFT/RIGHT]  Score: ${catchScore}  Miss: ${missCount}`, 10, 12);
            ctx.fillText(`${characters[charIdx].name}`, 10, 230);
        }

        // --- MINI GAME 3: DODGE ---
        let dodgeX = 150, dodgeBullets = [];
        let dodgeScore = 0;
        let dodgeAlive = true;
        function dodgeReset() { dodgeX = 150; dodgeBullets = []; dodgeScore = 0; dodgeAlive = true; }
        function spawnDodge() {
            if (Math.random() < 0.04) dodgeBullets.push({ x: Math.random() * 295, y: 0, speed: 2 + Math.random() * 3 });
        }
        function dodgeUpdate() {
            if (!dodgeAlive) return;
            if (keys['ArrowLeft']) dodgeX = Math.max(0, dodgeX - 4);
            if (keys['ArrowRight']) dodgeX = Math.min(300, dodgeX + 4);
            spawnDodge();
            dodgeBullets = dodgeBullets.filter(b => {
                b.y += b.speed;
                if (b.y > 200 && b.x > dodgeX - 5 && b.x < dodgeX + 25) {
                    dodgeAlive = false;
                    beep(110, 0.3);
                    return false;
                }
                return b.y < 240;
            });
            if (dodgeAlive) dodgeScore++;
        }
        function dodgeDraw() {
            ctx.fillStyle = '#110011';
            ctx.fillRect(0, 0, 320, 240);
            // Player
            ctx.fillStyle = dodgeAlive ? characters[charIdx].color : '#444';
            ctx.fillRect(dodgeX, 200, 20, 20);
            // Bullets
            dodgeBullets.forEach(b => {
                ctx.fillStyle = '#ff4400';
                ctx.fillRect(b.x, b.y, 8, 8);
            });
            ctx.fillStyle = '#fff';
            ctx.font = '8px monospace';
            ctx.fillText(`DODGE! [LEFT/RIGHT]  Score: ${dodgeScore}`, 10, 12);
            if (!dodgeAlive) ctx.fillText('HIT! SWITCHING...', 80, 120);
            ctx.fillText(`${characters[charIdx].name}`, 10, 230);
        }

        // --- GAME STATE MACHINE ---
        const miniGames = [
            { name: 'Jump', reset: jumpReset, update: jumpUpdate, draw: jumpDraw },
            { name: 'Catch', reset: catchReset, update: catchUpdate, draw: catchDraw },
            { name: 'Dodge', reset: dodgeReset, update: dodgeUpdate, draw: dodgeDraw },
        ];

        let currentGame = 0;
        let gameTimer = 0;
        const GAME_DURATION = 60 * 12; // 12 seconds at 60fps
        let totalScore = 0;

        // Screen states: 'title', 'playing', 'scoreboard'
        let state = 'title';

        miniGames.forEach(g => g.reset());

        function drawTitle() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 320, 240);
            // Pixel border
            ctx.fillStyle = '#fff';
            ctx.fillRect(10, 10, 300, 220);
            ctx.fillStyle = '#000';
            ctx.fillRect(14, 14, 292, 212);

            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 16px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('COMMUNITY YOUTH', 160, 70);
            ctx.fillStyle = '#00ffff';
            ctx.font = '12px monospace';
            ctx.fillText('RETRO GAMES', 160, 92);

            ctx.fillStyle = '#fff';
            ctx.font = '9px monospace';
            ctx.fillText('PRESS ANY KEY TO START', 160, 140);

            // Draw character previews
            const colors = ['#f00', '#0ff', '#ff0', '#f0f'];
            const names = ['ALEX', 'JORDAN', 'TAYLOR', 'MORGAN'];
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = colors[i];
                ctx.fillRect(40 + i * 65, 160, 20, 20);
                ctx.fillStyle = '#fff';
                ctx.font = '7px monospace';
                ctx.fillText(names[i], 40 + i * 65 - 5, 195);
            }
            ctx.textAlign = 'left';
        }

        function drawScoreboard() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 320, 240);
            ctx.fillStyle = '#fff';
            ctx.fillRect(10, 10, 300, 220);
            ctx.fillStyle = '#000';
            ctx.fillRect(14, 14, 292, 212);
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', 160, 60);
            ctx.fillStyle = '#fff';
            ctx.font = '11px monospace';
            ctx.fillText(`SCORE: ${totalScore}`, 160, 100);
            ctx.fillText('PRESS ANY KEY', 160, 160);
            ctx.fillText('TO PLAY AGAIN', 160, 178);
            ctx.textAlign = 'left';
        }

        let gamesPlayed = 0;
        const TOTAL_ROUNDS = miniGames.length * 2;

        function nextGame() {
            gamesPlayed++;
            if (gamesPlayed >= TOTAL_ROUNDS) {
                state = 'scoreboard';
                return;
            }
            currentGame = gamesPlayed % miniGames.length;
            charIdx = (charIdx + 1) % characters.length;
            miniGames[currentGame].reset();
            gameTimer = 0;
            beep(392, 0.15);
        }

        window.addEventListener('keydown', () => {
            if (state === 'title') { state = 'playing'; audioCtx.resume(); }
            else if (state === 'scoreboard') {
                state = 'title';
                gamesPlayed = 0;
                totalScore = 0;
                charIdx = 0;
                currentGame = 0;
                miniGames.forEach(g => g.reset());
            }
        });

        function loop() {
            if (state === 'title') {
                drawTitle();
            } else if (state === 'playing') {
                miniGames[currentGame].update();
                miniGames[currentGame].draw();

                // Timer bar
                const ratio = 1 - gameTimer / GAME_DURATION;
                ctx.fillStyle = ratio > 0.3 ? '#0f0' : '#f00';
                ctx.fillRect(0, 236, 320 * ratio, 4);

                // Game label
                ctx.fillStyle = '#fff';
                ctx.font = '7px monospace';
                ctx.fillText(`GAME ${gamesPlayed + 1}/${TOTAL_ROUNDS}`, 245, 232);

                gameTimer++;
                if (gameTimer >= GAME_DURATION) {
                    // Tally score
                    if (currentGame === 0) totalScore += jumpScore;
                    if (currentGame === 1) totalScore += catchScore;
                    if (currentGame === 2) totalScore += dodgeScore;
                    nextGame();
                }
            } else if (state === 'scoreboard') {
                drawScoreboard();
            }

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
