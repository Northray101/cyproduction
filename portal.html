<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Volunteer Portal — CY Production</title>
  <link rel="icon" type="image/png" href="cy.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="portal.css">

  <style>
    /* ── Sign-Out Button ─────────────────────────────────────── */
    .signout-wrapper {
      display: flex;
      align-items: center;
      margin-left: auto;
      margin-right: 8px;
      z-index: 210;
    }

    .signout-btn {
      display: flex;
      align-items: center;
      gap: 0;
      height: 36px;
      width: 36px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 0 10px;
      transition:
        width   0.32s var(--ease-spring),
        background 0.22s ease,
        border-color 0.22s ease,
        color 0.22s ease;
      white-space: nowrap;
    }
    .signout-btn:hover { color: var(--text); background: rgba(255,255,255,0.09); }
    .signout-btn.confirming {
      width: 132px;
      background: rgba(255, 90, 90, 0.13);
      border-color: rgba(255, 90, 90, 0.5);
      color: var(--danger);
    }
    .signout-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      transition: transform 0.28s var(--ease-spring);
    }
    .signout-btn.confirming svg { transform: rotate(90deg); }
    .signout-label {
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width 0.3s var(--ease-spring), opacity 0.2s ease 0.1s;
      padding-left: 0;
    }
    .signout-btn.confirming .signout-label {
      max-width: 100px;
      opacity: 1;
      padding-left: 7px;
    }

    /* ── Login Overlay ───────────────────────────────────────── */
    #loginOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    #loginOverlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--bg);
    }
    #loginOverlay::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,168,255,0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-bg 6s ease-in-out infinite;
    }
    @keyframes pulse-bg {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50%       { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    .login-box {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 320px;
      text-align: center;
      animation: login-enter 0.6s var(--ease-spring) both;
    }
    @keyframes login-enter {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      display: block;
      animation: login-enter 0.6s var(--ease-spring) 0.05s both;
    }

    .login-box h2 {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 4px;
      color: var(--text);
      animation: login-enter 0.6s var(--ease-spring) 0.1s both;
    }
    .login-box .sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
      animation: login-enter 0.6s var(--ease-spring) 0.14s both;
    }

    /* Dots */
    .dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 32px;
      animation: login-enter 0.6s var(--ease-spring) 0.18s both;
    }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1.5px solid var(--subtle);
      transition:
        background 0.22s var(--ease-snap),
        border-color 0.22s ease,
        transform 0.22s var(--ease-snap),
        box-shadow 0.22s ease;
    }
    .dot.filled {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(79,168,255,0.45);
    }

    /* Keypad */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      animation: login-enter 0.6s var(--ease-spring) 0.22s both;
    }
    .key {
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      overflow: hidden;
      transition:
        background 0.15s ease,
        border-color 0.15s ease,
        transform 0.12s var(--ease-snap);
    }
    .key::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(79,168,255,0.18) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .key:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
    }
    .key:hover::after { opacity: 1; }
    .key:active {
      transform: scale(0.9);
      background: rgba(79,168,255,0.1);
      border-color: rgba(79,168,255,0.3);
    }
    .key.empty { visibility: hidden; pointer-events: none; }

    .error-msg {
      color: var(--danger);
      font-size: 12.5px;
      margin-top: 18px;
      height: 16px;
      opacity: 0;
      transition: opacity 0.25s ease;
      letter-spacing: 0.01em;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--muted);
      padding: 9px 22px;
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: background var(--transition-base), color var(--transition-base), border-color var(--transition-base);
      text-decoration: none;
      animation: login-enter 0.6s var(--ease-spring) 0.28s both;
    }
    .back-link:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-color: rgba(255,255,255,0.12);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60%  { transform: translateX(-8px); }
      40%, 80%  { transform: translateX(8px); }
    }
    .shake { animation: shake 0.36s ease-in-out; }

    /* ── Doc Content ─────────────────────────────────────────── */
    .doc-content {
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }
    .doc-content * {
      background-color: transparent !important;
      color: inherit !important;
      font-family: 'Outfit', sans-serif !important;
      max-width: 100% !important;
      box-sizing: border-box !important;
    }
    .doc-content b, .doc-content strong { font-weight: 700 !important; color: #fff !important; }
    .doc-content h1, .doc-content h2, .doc-content h3,
    .doc-content h4, .doc-content h5, .doc-content h6 {
      color: #fff !important;
      font-weight: 700 !important;
      letter-spacing: -0.02em;
      margin-top: 1.5em !important;
      margin-bottom: 0.5em !important;
    }
    .doc-content a { color: var(--accent) !important; }
    .doc-content ul, .doc-content ol { padding-left: 20px !important; margin: 10px 0 !important; }
    .doc-content li { margin-bottom: 5px !important; }
    .doc-content table {
      border-collapse: collapse !important;
      width: 100% !important;
      margin: 16px 0 !important;
    }
    .doc-content td, .doc-content th {
      border: 1px solid var(--glass-border) !important;
      padding: 8px 12px !important;
      vertical-align: top;
    }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .signout-wrapper {
        position: absolute;
        top: 14px;
        left: 16px;
        margin: 0;
      }
    }
  </style>
</head>
<body>

<!-- ── Login Overlay ──────────────────────────────────────── -->
<div id="loginOverlay">
  <div class="login-box" id="loginBox">
    <img src="cy.png" alt="CY" class="login-logo">
    <h2>Portal Access</h2>
    <p class="sub">Enter team passcode</p>

    <div class="dots" id="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="keypad">
      <div class="key" data-k="1">1</div>
      <div class="key" data-k="2">2</div>
      <div class="key" data-k="3">3</div>
      <div class="key" data-k="4">4</div>
      <div class="key" data-k="5">5</div>
      <div class="key" data-k="6">6</div>
      <div class="key" data-k="7">7</div>
      <div class="key" data-k="8">8</div>
      <div class="key" data-k="9">9</div>
      <div class="key empty"></div>
      <div class="key" data-k="0">0</div>
      <div class="key" data-k="back">⌫</div>
    </div>

    <p id="errorMsg" class="error-msg">Incorrect passcode</p>
    <a class="back-link" href="index.html">← Back to Home</a>
  </div>
</div>

<!-- ── Header ─────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <a class="brand" href="index.html">
      <img src="cy.png" alt="CY"> Portal
    </a>

    <div class="nav-scroll-area">
      <nav class="nav" id="mainNav">
        <div id="navBg" class="nav-bg"></div>
        <button data-nav="notes">Notes</button>
        <button data-nav="guides">Guides</button>
      </nav>
    </div>

    <div class="signout-wrapper">
      <button class="signout-btn" id="signOutBtn" aria-label="Sign out">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="signout-label">Are you sure?</span>
      </button>
    </div>

    <div class="menu-wrapper">
      <div class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </div>
      <div id="menuDropdown" class="menu-dropdown">
        <a href="index.html">Home Website</a>
      </div>
    </div>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────────── -->
<main id="mainContent">
  <div class="welcome-header">
    <h1 id="welcomeText">Welcome,</h1>
    <p>View the latest production notes and schedules below.</p>
  </div>

  <div class="glass-panel" id="docContainer">
    <div class="load-state">
      <div class="spinner"></div>
      Loading notes…
    </div>
  </div>
</main>

<script src="portal.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const notesBtn = document.querySelector('[data-nav="notes"]');
  if (notesBtn) notesBtn.id = 'notesBtn';
  const guidesBtn = document.querySelector('[data-nav="guides"]');
  if (guidesBtn) guidesBtn.id = 'guidesBtn';

  initNav({
    activeId: 'notesBtn',
    routes: {
      guides: () => setTimeout(() => { window.location.href = 'guides.html'; }, 380)
    }
  });

  initMenu();
  initNavResize();
  initSignOut();
  initLogin();
});

/* ── Sign Out ──────────────────────────────────────────────── */
function initSignOut() {
  const btn = document.getElementById('signOutBtn');
  if (!btn) return;
  let confirming = false;
  const svgEl = btn.querySelector('svg');
  const xIcon = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
  const exitIcon = '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>';

  btn.addEventListener('click', () => {
    if (!confirming) {
      confirming = true;
      btn.classList.add('confirming');
      svgEl.innerHTML = xIcon;
    } else {
      localStorage.removeItem('cy_portal_role');
      window.location.reload();
    }
  });

  document.addEventListener('click', (e) => {
    if (confirming && !btn.contains(e.target)) {
      confirming = false;
      btn.classList.remove('confirming');
      svgEl.innerHTML = exitIcon;
    }
  });
}

/* ── Login ─────────────────────────────────────────────────── */
function initLogin() {
  const overlay  = document.getElementById('loginOverlay');
  const loginBox = document.getElementById('loginBox');
  const dotsEl   = document.getElementById('dots');
  const errorEl  = document.getElementById('errorMsg');

  const PASS_VOL = '0316';
  const PASS_DIR = '6464';
  let input = '';

  const cached = localStorage.getItem('cy_portal_role');
  if (cached === 'Volunteer' || cached === 'Director') {
    loadContent(cached);
  } else {
    overlay.style.display = 'flex';
  }

  document.querySelectorAll('.key[data-k]').forEach(key => {
    key.addEventListener('click', () => {
      const k = key.dataset.k;
      if (k === 'back') { erase(); return; }
      if (input.length < 4) { input += k; render(); if (input.length === 4) check(); }
    });
  });

  document.addEventListener('keydown', (e) => {
    if (overlay.style.display === 'none') return;
    if (e.key >= '0' && e.key <= '9' && input.length < 4) {
      input += e.key; render(); if (input.length === 4) check();
    } else if (e.key === 'Backspace') { erase(); }
    else if (e.key === 'Escape') { window.location.href = 'index.html'; }
  });

  function erase() {
    input = input.slice(0, -1);
    render();
    errorEl.style.opacity = '0';
  }

  function render() {
    dotsEl.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('filled', i < input.length);
    });
  }

  function check() {
    if (input === PASS_VOL) { unlock('Volunteer'); }
    else if (input === PASS_DIR) { unlock('Director'); }
    else {
      errorEl.style.opacity = '1';
      loginBox.classList.add('shake');
      // Ripple the dots red briefly
      dotsEl.querySelectorAll('.dot').forEach(d => {
        d.style.background = 'var(--danger)';
        d.style.borderColor = 'var(--danger)';
        d.style.boxShadow = '0 0 10px rgba(255,90,90,0.4)';
      });
      setTimeout(() => {
        loginBox.classList.remove('shake');
        input = '';
        render();
        dotsEl.querySelectorAll('.dot').forEach(d => {
          d.style.background = '';
          d.style.borderColor = '';
          d.style.boxShadow = '';
        });
      }, 500);
    }
  }

  function unlock(role) {
    localStorage.setItem('cy_portal_role', role);
    overlay.style.transition = 'opacity 0.5s ease';
    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 500);
    loadContent(role);
  }
}

/* ── Content ───────────────────────────────────────────────── */
function loadContent(role) {
  const welcomeEl = document.getElementById('welcomeText');
  if (role === 'Director') {
    welcomeEl.textContent = 'Welcome, Director';
    fetchDoc('https://docs.google.com/document/d/e/2PACX-1vRokjRzfFexinsjGaD4-iCpVLRRRpFR3nWpEcVx7TTqJD8JzdtVCIcB5TdXvHclOHbkeleGIQhmsQAt/pub');
  } else {
    welcomeEl.textContent = 'Welcome,';
    fetchDoc('https://docs.google.com/document/d/e/2PACX-1vTNLwNN_Y0QvD4_tBw_1Yw7aH7vuQ1qlpur86QJ3rnlYKxF_bM21pt3TQ3M6PdEN0O9oKy5ATFEyUu3/pub');
  }
}

async function fetchDoc(url) {
  const container = document.getElementById('docContainer');
  const PROXIES = [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url=',
    'https://api.codetabs.com/v1/proxy?quest='
  ];

  let html = null;
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url));
      if (res.ok) { html = await res.text(); break; }
    } catch { /* try next */ }
  }

  if (!html) {
    container.innerHTML = '<p style="color:var(--danger);text-align:center;padding:40px;">Failed to load notes. Please reload or check connection.</p>';
    return;
  }

  try {
    const parser  = new DOMParser();
    const doc     = parser.parseFromString(html, 'text/html');
    const content = doc.querySelector('#contents') || doc.body;
    container.innerHTML = `<div class="doc-content">${content.innerHTML}</div>`;
  } catch (err) {
    container.innerHTML = '<p style="color:var(--danger);text-align:center;padding:40px;">Error parsing notes.</p>';
    console.error(err);
  }
}
</script>
</body>
</html>
